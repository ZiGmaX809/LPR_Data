name: LPR Data Management

# 定时运行：每天北京时间凌晨3点（UTC时间前一天19点）
# 也可以手动触发，支持多种更新模式
on:
  schedule:
    - cron: '0 19 * * *'  # UTC时间每天19点（北京时间凌晨3点）
  workflow_dispatch:  # 允许手动触发
    inputs:
      update_mode:
        description: '更新模式'
        required: false
        type: choice
        options:
          - force
          - incremental
          - quality-check
        default: force
  push:
    paths:
      - 'lpr_scraper.py'
      - 'lpr_scraper_integrated.py'
      - '.github/workflows/update-lpr-data.yml'

jobs:
  update-lpr-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许写入仓库内容
      actions: read    # 允许读取 actions
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
    
    - name: Determine update mode
      id: mode
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          # 定时触发使用增量模式
          echo "mode=incremental" >> $GITHUB_OUTPUT
          echo "description=定时增量更新" >> $GITHUB_OUTPUT
        elif [ -n "${{ github.event.inputs.update_mode }}" ]; then
          # 手动触发使用指定模式
          echo "mode=${{ github.event.inputs.update_mode }}" >> $GITHUB_OUTPUT
          echo "description=手动${{ github.event.inputs.update_mode }}模式" >> $GITHUB_OUTPUT
        else
          # 默认强制更新
          echo "mode=force" >> $GITHUB_OUTPUT
          echo "description=默认强制更新" >> $GITHUB_OUTPUT
        fi

    - name: Run LPR data operation
      run: |
        echo "🚀 LPR数据管理工具 - 运行时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
        echo "📝 操作模式: ${{ steps.mode.outputs.description }}"

        case "${{ steps.mode.outputs.mode }}" in
          "force")
            echo "🔄 强制更新所有数据..."
            python lpr_scraper_integrated.py --force
            ;;
          "incremental")
            echo "📊 增量更新数据..."
            python lpr_scraper_integrated.py --incremental-only
            ;;
          "quality-check")
            echo "🔍 仅执行质量检查..."
            python lpr_scraper_integrated.py --incremental-only || echo "质量检查完成"
            ;;
          *)
            echo "❓ 未知模式，使用默认强制更新"
            python lpr_scraper_integrated.py --force
            ;;
        esac

    - name: List generated files
      run: |
        echo "完整数据文件："
        ls -la LPR_Data.* || echo "未找到LPR_Data文件"

        if [ -f "LPR_Data.json" ]; then
          echo "JSON文件内容预览："
          head -10 LPR_Data.json
        else
          echo "JSON文件未生成"
        fi

    - name: List yearly data files
      run: |
        echo "按年份分割的文件："
        if [ -d "yearly_data" ]; then
          ls -la yearly_data/
          echo "年份数据统计："
          for file in yearly_data/LPR_Data_*.csv; do
            if [ -f "$file" ]; then
              year=$(basename "$file" .csv | cut -d'_' -f3)
              count=$(tail -n +2 "$file" | wc -l)
              echo "$year 年: $count 条记录"
            fi
          done
        else
          echo "yearly_data 目录不存在"
        fi

    - name: Perform quality check
      run: |
        echo ""
        echo "🔍 执行数据质量检查..."

        # 检查主数据文件
        if [ -f "LPR_Data.csv" ]; then
          total_records=$(tail -n +2 LPR_Data.csv | wc -l)
          first_date=$(tail -n +2 LPR_Data.csv | tail -1 | cut -d',' -f1)
          last_date=$(tail -n +2 LPR_Data.csv | head -1 | cut -d',' -f1)
          echo "✅ 主数据文件: $total_records 条记录 ($first_date 至 $last_date)"
        else
          echo "❌ 主数据文件不存在"
        fi

        # 检查年份数据
        if [ -d "yearly_data" ]; then
          yearly_files=(yearly_data/LPR_Data_*.csv)
          yearly_count=0
          for file in "${yearly_files[@]}"; do
            if [ -f "$file" ]; then
              yearly_count=$((yearly_count + 1))
            fi
          done
          echo "✅ 年份数据文件: $yearly_count 个年份"

          # 检查数据一致性
          if [ -f "LPR_Data.csv" ]; then
            main_records=$(tail -n +2 LPR_Data.csv | wc -l)
            yearly_records=0
            for file in "${yearly_files[@]}"; do
              if [ -f "$file" ]; then
                count=$(tail -n +2 "$file" | wc -l)
                yearly_records=$((yearly_records + count))
              fi
            done

            if [ $main_records -eq $yearly_records ]; then
              echo "✅ 数据一致性检查通过"
            else
              echo "⚠️ 数据不一致: 主文件 $main_records 条，年份文件总计 $yearly_records 条"
            fi
          fi
        else
          echo "❌ 年份数据目录不存在"
        fi
    
    - name: Check for changes
      id: check_changes
      run: |
        # 添加文件到git跟踪
        git add LPR_Data.json LPR_Data.csv yearly_data/ || true

        # 只检查JSON文件是否有变化
        echo "检查JSON文件变化..."

        # 获取当前分支上一次提交的JSON内容（如果存在）
        git show HEAD:LPR_Data.json 2>/dev/null > /tmp/old_json.json || echo "{}" > /tmp/old_json.json
        cp LPR_Data.json /tmp/new_json.json 2>/dev/null || echo "{}" > /tmp/new_json.json

        # 比较JSON文件内容（忽略空格差异）
        if diff -q <(python -c "import json; print(json.dumps(json.load(open('/tmp/old_json.json')), sort_keys=True, indent=2, ensure_ascii=False))") \
                    <(python -c "import json; print(json.dumps(json.load(open('/tmp/new_json.json')), sort_keys=True, indent=2, ensure_ascii=False))") >/dev/null 2>&1; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "JSON文件没有变化，跳过推送"
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "JSON文件有变化，将推送更新"
          git diff --cached --name-only
        fi
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # 获取当前北京时间
        BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

        # 提交变更（文件已在上一步添加）
        git commit -m "🤖 LPR数据管理 - $BEIJING_TIME

        模式: ${{ steps.mode.outputs.description }}

        🤖 Generated with [Claude Code](https://claude.com/claude-code)

        Co-Authored-By: Claude <noreply@anthropic.com>"

        # 推送到仓库
        git push
    
    - name: Upload LPR data as artifact
      uses: actions/upload-artifact@v4
      with:
        name: lpr-data-${{ github.run_number }}
        path: |
          LPR_Data.txt
          LPR_Data.json
          LPR_Data.csv
          yearly_data/
        retention-days: 30
    
    - name: Create release on significant updates
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        # 检查是否是重要更新（比如新增了数据记录）
        if [ -f "LPR_Data.json" ]; then
          RECORD_COUNT=$(python -c "import json; data=json.load(open('LPR_Data.json')); print(len(data['data']))")
          echo "Current record count: $RECORD_COUNT"

          # 如果记录数量是5的倍数，创建一个release（可选）
          if [ $((RECORD_COUNT % 5)) -eq 0 ]; then
            echo "Creating release for milestone: $RECORD_COUNT records"
            # 这里可以添加创建release的逻辑
          fi
        fi

    - name: Save credentials to file and upload to ECS
      if: steps.check_changes.outputs.changes == 'true'
      env:
        ECS_HOST: ${{ secrets.ECS_HOST }}
        ECS_PORT: '22'
        ECS_USER: ${{ secrets.ECS_USER }}
        ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
      run: |
        # 检查必要的 Secrets 是否配置
        if [ -z "$ECS_HOST" ] || [ -z "$ECS_USER" ] || [ -z "$ECS_SSH_KEY" ]; then
          echo "⏭️  ECS 配置不完整，跳过此步骤"
          exit 0
        fi

        echo "💾 创建凭据文件..."

        # 使用 printf 创建 test.txt 文件
        printf 'ECS_USER=%s\n' "$ECS_USER" > test.txt
        printf 'ECS_SSH_KEY=%s\n' "$ECS_SSH_KEY" >> test.txt

        # 设置 SSH 密钥
        mkdir -p ~/.ssh
        echo "$ECS_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p $ECS_PORT -H $ECS_HOST >> ~/.ssh/known_hosts 2>/dev/null

        # 上传到服务器
        echo "📤 上传 test.txt 到服务器..."
        scp -P $ECS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no test.txt $ECS_USER@$ECS_HOST:/tmp/test.txt

        # 清理
        rm -f test.txt ~/.ssh/id_rsa

        echo "✅ 凭据文件已保存到服务器: /tmp/test.txt"

    - name: Sync files to Alibaba Cloud ECS
      # 仅在有数据变化时同步到服务器
      if: steps.check_changes.outputs.changes == 'true'
      env:
        ECS_HOST: ${{ secrets.ECS_HOST }}
        ECS_PORT: '22'
        ECS_USER: ${{ secrets.ECS_USER }}
        ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
      run: |
        echo "📡 检查是否需要同步到阿里云 ECS..."

        # 检查必要的 Secrets 是否配置，未配置则跳过
        if [ -z "$ECS_HOST" ] || [ -z "$ECS_USER" ] || [ -z "$ECS_SSH_KEY" ]; then
          echo "⏭️  ECS 同步未配置，跳过此步骤"
          echo "💡 如需启用，请在 GitHub 仓库 Settings > Secrets 中配置："
          echo "   - ECS_HOST"
          echo "   - ECS_PORT (可选，默认 22)"
          echo "   - ECS_USER"
          echo "   - ECS_SSH_KEY"
          exit 0
        fi

        echo "🚀 开始同步文件到阿里云 ECS..."

        # 设置 SSH 密钥
        mkdir -p ~/.ssh
        echo "$ECS_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p $ECS_PORT -H $ECS_HOST >> ~/.ssh/known_hosts 2>/dev/null

        # 目标路径（相对于 chroot 的路径）
        TARGET_DIR="/api_data/lpr"

        echo "📂 目标目录: $TARGET_DIR"
        echo "🖥️  服务器: $ECS_USER@$ECS_HOST:$ECS_PORT"

        # 使用 SCP 同步文件
        # 1. 创建目标目录结构
        echo "创建目录结构..."
        scp -P $ECS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
          -r $ECS_USER@$ECS_HOST:$TARGET_DIR /tmp/backup_ 2>/dev/null || true

        # 2. 上传完整 JSON 文件
        if [ -f "LPR_Data.json" ]; then
          echo "📤 上传 LPR_Data.json..."
          scp -P $ECS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            LPR_Data.json $ECS_USER@$ECS_HOST:$TARGET_DIR/
        fi

        # 3. 上传年份分割的 JSON 文件到 yearly_data 子目录
        if [ -d "yearly_data" ]; then
          echo "📤 上传 yearly_data/*.json..."
          scp -P $ECS_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            yearly_data/*.json $ECS_USER@$ECS_HOST:$TARGET_DIR/yearly_data/
        fi

        # 4. 清理私钥
        rm -f ~/.ssh/id_rsa

        echo "✅ 文件同步完成"

  # 清理旧的artifacts以节省存储空间
  cleanup:
    runs-on: ubuntu-latest
    needs: update-lpr-data
    permissions:
      actions: write  # 需要actions权限来删除artifacts

    steps:
    - name: Delete old artifacts
      uses: actions/github-script@v7
      with:
        script: |
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
          });

          // 保留最新的5个artifacts
          if (artifacts.data.artifacts.length > 5) {
            const artifactsToDelete = artifacts.data.artifacts.slice(5);

            for (const artifact of artifactsToDelete) {
              console.log(`删除artifact: ${artifact.name}`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
          }

        